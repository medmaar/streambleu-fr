name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - 'worker/worker.js'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers
        run: |
          RESULT=$(curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/scripts/iptv-trial-streambleu" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -F 'metadata={"main_module":"worker.js","compatibility_date":"2024-01-01","bindings":[{"type":"kv_namespace","name":"TRIALS","namespace_id":"d5e88bf585c54d26aea650d283170abd"}]};type=application/json' \
            -F "worker.js=@worker/worker.js;type=application/javascript+module")
          echo "$RESULT" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          if d.get('success'): print('Deployed: iptv-trial-streambleu')
          else: print('Error:', d.get('errors')); exit(1)
          "

      - name: Enable workers.dev subdomain
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/scripts/iptv-trial-streambleu/subdomain" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"enabled":true}' | python3 -c "import sys,json; print('Subdomain:', json.load(sys.stdin).get('success'))"
