<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7b87e8"/>
      <stop offset="100%" stop-color="#5a5fcf"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- White circle in centre -->
  <circle cx="32" cy="32" r="24" fill="white"/>
  <!-- Wave arcs — purple on white -->
  <!-- Bottom arc (widest) -->
  <path d="M 14 41 Q 32 31 50 41" stroke="#5a5fcf" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <!-- Middle arc -->
  <path d="M 18.5 33 Q 32 23.5 45.5 33" stroke="#5a5fcf" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <!-- Top arc -->
  <path d="M 23 25 Q 32 16.5 41 25" stroke="#5a5fcf" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <!-- Centre dot -->
  <circle cx="32" cy="47.5" r="3.8" fill="#5a5fcf"/>
</svg>
